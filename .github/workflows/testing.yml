name: build and deply a testing container  

on:
  push:
    branches: [V2]
  pull_request:
    branches: [V2]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14.6']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - run: | 
          python -m pip install --upgrade pip
          pip install -r requirements.txt  
          pip install pytest
#      - run: python -m pytest --tb=short
#        env:
#          BOT_TOKEN_TEST: ${{ secrets.BOT_TOKEN_TEST }}

  build-and-push:
    needs: test
    if: github.ref == 'refs/heads/V2'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime-test 
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            spoon20/telegram_download_bot:latest-test
            spoon20/telegram_download_bot:${{ github.sha }}-test
          cache-from: type=gha,scope=build-V2
          cache-to: type=gha,mode=max,scope=build-V2


  deploy:
    needs: build-and-push
    if: github.ref == 'refs/heads/V2'
    runs-on: ubuntu-latest
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy to server
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262 # v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            cd ~/Telegram_download_bot
            docker compose --profile testing pull telegram_download_bot
            docker compose --profile testing up -d telegram_download_bot
            docker image prune -f