services:
  telegram_download_bot:
    image: spoon20/telegram_download_bot:v2.2  # Optional: tag the built image for reuse without rebuilding
    container_name: telegram_download_bot

    restart: unless-stopped

    # ── Environment ──────────────────────────────────────────────────────────
    # Keep secrets out of the image; use a .env file or set them at runtime.
    # Copy .env.example → .env and fill in your values.
    env_file:
      - .env                  # BOT_TOKEN=xxx  (used by Token.py if you refactor)

    environment:
      - PYTHONUNBUFFERED=1    # Makes logs appear immediately (no buffering)
      - PYTHONDONTWRITEBYTECODE=1   # No .pyc files → smaller container FS

    # ── Volumes ──────────────────────────────────────────────────────────────
    volumes:
      - ./data:/app/data          # Persistent user data / database
      - ./Logic:/app/Logic
      - ./handlers:/app/handlers
      - ./cookies:/app/cookies    # Store cookies for platforms that need them

    # ── Resource limits ──────────────────────────────────────────────────────
    # Prevents the bot from eating all RAM/CPU on shared hosts or small VPSes.
    # Tune to your server's capacity.
#    deploy:
#      resources:
#        limits:
#          cpus: "1.0"         # Max 1 CPU core
#          memory: 512M        # Max 512 MB RAM
#        reservations:
#          cpus: "0.25"        # Always gets at least 0.25 cores
#          memory: 128M        # Always gets at least 128 MB RAM

    # ── Healthcheck ──────────────────────────────────────────────────────────
    # Docker will restart the container automatically if health fails 3× in a row.
    healthcheck:
      test: ["CMD", "python", "-c", "import os; exit(0 if os.path.exists('/app/index.py') else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    # ── Logging ──────────────────────────────────────────────────────────────
    # json-file driver with rotation keeps log files from filling your disk.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"